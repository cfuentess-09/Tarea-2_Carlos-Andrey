<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro de Usuario</title>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Linkear con CSS-->
    <link rel="stylesheet" href="CSS/Formulario_1.css">
</head>
<body>
    
    <!-- Formulario de registro -->
    <section class="contenedor-formulario-azul">
        <h2>Registro de usuario</h2>
 
        <form>
 
            <div class="contenedor-horizontal">
                <label for="txtUsuario2" class="icono-etiqueta" aria-label="Nombre de usuario:">
                    <i class="fa-solid fa-user"></i>
                </label>
                <input type="text" id="txtUsuario2" placeholder="nombre de usuario">
            </div>
 
            <div class="contenedor-horizontal">
                <label for="txtContrasena2" class="icono-etiqueta" aria-label="Contraseña:">
                    <i class="fa-solid fa-key"></i>
                </label>
                <input type="password" id="txtContrasena2" placeholder="contraseña">
            </div>
 
            <div class="contenedor-horizontal">
                <label for="txtConfirmarContrasena2" class="icono-etiqueta" aria-label="Confirmar contraseña:">
                    <i class="fa-solid fa-key"></i>
                </label>
                <input type="password" id="txtConfirmarContrasena2" placeholder="confirmar contraseña">
            </div>
 
            <button type="button" id="btnCrearCuenta">Crear cuenta</button>
 
        </form>
    </section>
 
 
    <!-- Enlazan los archivos JS -->
    <script src="JS/Formulario_1.js"></script>
        
</body>
</html>
